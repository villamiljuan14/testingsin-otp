{% comment %}
Componente reutilizable para mostrar tarjetas de estadísticas.
Uso: {% include "dashboard/components/stat_card.html" with title="Título" value=123 icon="nombre_icono" color="blue" %}
{% endcomment %}
<div class="bg-custom-surface rounded-3xl p-6 border border-custom-ui/5 shadow-sm hover:shadow-md transition-all group overflow-hidden relative">
    <div class="absolute -right-4 -top-4 w-24 h-24 bg-{{ color }}-500/5 rounded-full blur-2xl group-hover:bg-{{ color }}-500/10 transition-colors"></div>
    <div class="flex items-center gap-4">
        <div class="h-12 w-12 rounded-2xl bg-{{ color }}-500/10 flex items-center justify-center text-{{ color }}-600">
            <span class="material-symbols-outlined">{{ icon }}</span>
        </div>
        <div>
            <p class="text-[11px] font-bold text-custom-tertiary uppercase tracking-widest">{{ title }}</p>
            <h3 class="text-2xl font-black text-custom-primary">{{ value|default:0 }}</h3>
        </div>
    </div>
</div>
